<!DOCTYPE html>
<html>

<head>

<title>PDF a Imagen</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
text-align:center;
padding:50px;
}

.drop-area{

border:2px dashed #5b5be6;

border-radius:10px;

padding:40px;

width:400px;

margin:auto;

background:white;

cursor:pointer;

transition:0.2s;

}

.drop-area:hover{

background:#eef0ff;

}

button{

margin-top:20px;

padding:10px 20px;

background:#5b5be6;

border:none;

color:white;

border-radius:6px;

cursor:pointer;

}

</style>

</head>

<body>

<h1>Convertir PDF a Imagen</h1>

<form method="POST" enctype="multipart/form-data">

<div class="drop-area" id="drop-area">

<p>Arrastra tu PDF aquí</p>

<input type="file" name="pdf" id="fileInput" hidden required>

</div>

<button type="submit">Convertir</button>

</form>


<script>

const dropArea = document.getElementById("drop-area")
const fileInput = document.getElementById("fileInput")

dropArea.addEventListener("click", () => {
fileInput.click()
})

dropArea.addEventListener("dragover", (e) => {
e.preventDefault()
dropArea.style.background="#eef0ff"
})

dropArea.addEventListener("dragleave", () => {
dropArea.style.background="white"
})

dropArea.addEventListener("drop", (e) => {

e.preventDefault()

fileInput.files = e.dataTransfer.files

dropArea.innerHTML = "<p>"+e.dataTransfer.files[0].name+"</p>"

})

</script>

</body>

</html>
