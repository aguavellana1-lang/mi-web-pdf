<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PDF Tools</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#4f46e5;
color:white;
padding:30px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-top:0;
}

.btn{
display:inline-block;
margin-top:10px;
padding:8px 14px;
background:#4f46e5;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>
</head>

<body>

<header>
<h1>📄 PDF & Productivity Tools</h1>
<p>Herramientas simples para trabajar con PDF</p>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h3>Unir PDF</h3>
<a class="btn" href="/unir_pdf">Abrir</a>
</div>

<div class="card">
<h3>Dividir PDF</h3>
<a class="btn" href="/dividir_pdf">Abrir</a>
</div>

<div class="card">
<h3>PDF a Imagen</h3>
<a class="btn" href="/pdf_imagen">Abrir</a>
</div>

<div class="card">
<h3>Imagen a PDF</h3>
<a class="btn" href="/imagen_pdf">Abrir</a>
</div>

<div class="card">
<h3>Texto a PDF</h3>
<a class="btn" href="/convertir_texto_pdf">Abrir</a>
</div>

<div class="card">
<h3>Editor de Texto</h3>
<a class="btn" href="/texto">Abrir</a>
</div>

<div class="card">
<h3>Notas</h3>
<a class="btn" href="/notas">Abrir</a>
</div>

<div class="card">
<h3>Lista de Tareas</h3>
<a class="btn" href="/tareas">Abrir</a>
</div>

<div class="card">
<h3>Generador de CV</h3>
<a class="btn" href="/cv">Abrir</a>
</div>

<div class="card">
<h3>Generador de Factura</h3>
<a class="btn" href="/factura">Abrir</a>
</div>

<div class="card">
<h3>Agenda</h3>
<a class="btn" href="/agenda">Abrir</a>
</div>

</div>
</div>

</body>
</html>
