<!DOCTYPE html>
<html>

<head>
<title>Generador de CV en PDF Gratis</title>
<meta name="description" content="Crea tu currículum en PDF gratis online en segundos.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Generador de CV en PDF</h1>

<form action="/generar-cv" method="POST">

<input type="text" name="nombre" placeholder="Nombre completo" required>

<br><br>

<input type="text" name="profesion" placeholder="Profesión">

<br><br>

<textarea name="experiencia" placeholder="Experiencia laboral"></textarea>

<br><br>

<textarea name="habilidades" placeholder="Habilidades"></textarea>

<br><br>

<button type="submit">Descargar CV en PDF</button>

</form>

</body>

</html>
